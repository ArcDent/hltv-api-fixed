tags:
  - News
parameters:
  - name: year
    in: path
    type: integer
    description: Year for news (optional, defaults to current year)
  - name: month
    in: path
    type: string
    description: Month for news (optional, defaults to current month)
responses:
  200:
    description: News articles
    schema:
      type: array
  500:
    description: News scrape process failed
    schema:
      type: object
      properties:
        error:
          type: string
          example: news_scrape_failed
        reason:
          type: string
          example: process_failed
        message:
          type: string
          example: Scrapy execution failed for the news archive scrape.
        year:
          type: integer
          example: 2026
        month:
          type: string
          example: April
  502:
    description: News scrape output/content validation failed
    schema:
      type: object
      properties:
        error:
          type: string
          example: news_scrape_failed
        reason:
          type: string
          description: Fetch or validation failure reason.
          enum:
            - empty_content
            - missing_output
            - browser_timeout
            - challenge_detected
            - fallback_failed
          example: empty_content
        message:
          type: string
          example: News scrape returned empty content for the requested archive period.
        year:
          type: integer
          example: 2026
        month:
          type: string
          example: April
